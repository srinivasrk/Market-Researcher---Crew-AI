market_landscape_task:
  description: >
    Research the sector "{sector}" for equity investing as of {current_year}.
    Tickers to exclude from this shortlist (user already received them as a primary pick
    within the policy window; comma-separated or the word none): {excluded_tickers}.
    If any exclusions are listed, do NOT include those tickers as candidates except as a
    last resort with an explicit note. Use search to find major listed players, emerging
    threats, regulatory or demand themes, and recent news. Produce a shortlist of 5–8
    candidate tickers (exchange:ticker or US ticker as standard), each with a one-line
    rationale and links/snippets from search supporting why it belongs in the list.
  expected_output: >
    Markdown sections: (1) Sector overview & key themes, (2) Table or bullet list of 5–8
    candidate tickers with rationale and source hints, (3) Honest notes on uncertainty
    or conflicting narratives.
  agent: market_researcher

financial_signals_task:
  description: >
    Using the candidate list from the previous task, search for each name and collect
    public financial and market signals for "{sector}" in {current_year}:
    latest revenue/earnings summaries, margin or growth commentary, notable balance-sheet
    flags, recent guidance or surprises, and any widely reported valuation context.
    If a symbol is unclear, resolve it via search before analyzing.
  expected_output: >
    Markdown: for each remaining candidate (you may drop 1–2 on thin data, with reason),
    a compact subsection with bullet points—Financial snapshot, Bull case, Bear case,
    Data confidence (high/medium/low). End with a comparison table across candidates.
  agent: financial_analyst

investment_recommendation_task:
  description: >
    Based strictly on the prior tasks' outputs, rank the THREE best eligible stocks for
    investment exposure to "{sector}" and declare a winner. You MUST NOT choose any ticker
    listed as excluded: {excluded_tickers}. If that is "none", there are no exclusions.
    If every strong candidate is excluded, pick the next-best eligible names and note the
    constraint. Your deliverable has two parts: (1) A clear podium of rank 1 (winner),
    rank 2 (runner-up), and rank 3 (third place)—each with a 2-3 sentence bull case and
    a one-to-two sentence explanation of its decisive edge over the next-ranked pick.
    (2) A full deep-dive on rank 1: thesis in 3-5 bullets, exactly 3 risks, what would
    invalidate the thesis, and a disclaimer that this is educational research only—not
    personalized financial, legal, or tax advice.
  expected_output: >
    A structured object (Pydantic/JSON) with these exact fields:
    primary_ticker (symbol only, matches rank 1 in top_three),
    company_name (full name for primary),
    top_three (array of EXACTLY 3 objects, each with: rank (int 1/2/3), ticker (symbol),
      company_name (string), brief_case (2-3 sentence bull case), edge_over_next (1-2
      sentences — for rank 1: decisive advantage over rank 2; for rank 2: what it lacked
      vs rank 1 but why it beats rank 3; for rank 3: what it beat in the broader list but
      lost to rank 2)),
    thesis_bullets (3-5 strings for the winner),
    risks (exactly 3 strings for the winner),
    invalidation_triggers (string),
    disclaimer (string),
    runner_up_ticker (must match top_three rank 2 ticker),
    runner_up_rationale (one sentence),
    exclusion_constraint_note (string or null if N/A),
    compared_tickers (array of 1-8 objects with ticker and why_primary_wins, for names
      outside the top 3 that were seriously evaluated).
    The top_three rank 1 ticker MUST equal primary_ticker. Populate every required field;
    use null only for exclusion_constraint_note when no exclusion forced a compromise.
  agent: investment_strategist
